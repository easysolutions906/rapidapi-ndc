<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="60" fill="#0d9488"/>
  <!-- Pill capsule -->
  <g transform="translate(250,210) rotate(-45)">
    <!-- Left half -->
    <rect x="-120" y="-45" width="120" height="90" rx="45" fill="#ffffff" opacity="0.7"/>
    <!-- Right half -->
    <rect x="0" y="-45" width="120" height="90" rx="45" fill="#ffffff"/>
    <!-- Dividing line -->
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#0d9488" stroke-width="4"/>
  </g>
  <text x="250" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">NDC</text>
</svg>